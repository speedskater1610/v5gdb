[package]
name = "v5gdb"
version = "0.1.0"
edition = "2024"

[profile.release]
opt-level = "z"
lto = "fat"

# These fields configure default behavior for uploads with `cargo v5`.
[package.metadata.v5]
upload-strategy = "differential"
slot = 1
icon = "cool-x"
compress = true

[dependencies]
gdbstub = "0.7.8"
gdbstub_arch = "0.3.2"
zynq7000 = "0.1.1"
critical-section = "1.2.0"
bitbybit = "1.4.0"
arbitrary-int = "2.0.0"
derive-mmio = "0.6.1"
cortex-ar = "0.3.0"
vex-sdk = "0.28.0"
snafu = { version = "0.8.9", default-features = false, features = ["rust_1_81"] }
vexide-devices = { version = "0.8.0", default-features = false }

[dev-dependencies]
vexide = { version = "0.8.0", features = ["full", "default-sdk"] }

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
